<!DOCTYPE html>
<html>
<head>
  <title>Arcane Empire</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="loginPanel">
  <h2>Login</h2>
  <input id="username" placeholder="Enter name">
  <button onclick="login()">Enter</button>
  <p id="msg"></p>
</div>

<div id="game" style="display:none;">
  <h2 id="welcome"></h2>
  <p id="stats"></p>

  <button onclick="train('attack')">Train Attack</button>
  <button onclick="train('health')">Train Health</button>
  <button onclick="train('defense')">Train Defense</button>

  <h3>Boss</h3>
  <img src="https://images.pexels.com/photos/1704481/pexels-photo-1704481.jpeg" width="200">
  <br>
  <button onclick="attackBoss()">Attack Boss</button>

  <p id="log"></p>
</div>

<!-- Firebase v8 (IMPORTANT) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="script.js"></script>
</body>
  </html>
