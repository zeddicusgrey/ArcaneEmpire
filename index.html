<!DOCTYPE html>
<html>
<head>
  <title>Arcane Empire</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <h1>Arcane Empire</h1>
  <input type="text" id="username" placeholder="Username"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button id="loginBtn">Enter World</button>
</div>

<!-- GAME -->
<div id="gameUI" class="hidden">

  <!-- PLAYER INFO -->
  <div class="panel">
    <h2 id="playerName"></h2>
    <p>💰 Gold: <span id="goldCount">0</span></p>
    <p>⚪ Silver: <span id="silverCount">0</span></p>
    <p>⭐ XP: <span id="xpCount">0</span></p>
    <p>📈 Level: <span id="levelCount">1</span></p>
    <p>🪙 Amulet: <span id="amuletCount">1</span></p>
    <p>⚔ Valor: <span id="valorCount">0</span></p>
  </div>

  <!-- BOSS -->
  <div class="panel">
    <h2>🐉 Boss</h2>
    <div class="bossBarContainer">
      <div id="bossBar"></div>
    </div>
    <button id="fightBtn">Attack Boss</button>
  </div>

  <!-- TRAIN -->
  <div class="panel">
    <button id="trainBtn">🏋 Train</button>
  </div>

  <!-- PVP -->
  <div class="panel">
    <h2>⚔ Arena</h2>
    <input type="text" id="pvpOpponent" placeholder="Opponent name">
    <button id="fightPlayerBtn">Fight Player</button>
    <div id="arenaLog"></div>
  </div>

  <!-- STORE -->
  <div class="panel">
    <h2>🛒 Store</h2>

    <button onclick="buyItem(shopItems.sword)">Steel Sword</button>
    <button onclick="buyItem(shopItems.axe)">Battle Axe</button>
    <button onclick="buyItem(shopItems.shield)">Shield</button>
    <button onclick="buyItem(shopItems.potion)">Potion</button>

    <h3>🎒 Inventory</h3>
    <div id="inventory"></div>
  </div>

  <!-- GUILD -->
  <div class="panel">
    <h2>👥 Guild</h2>
    <input type="text" id="guildNameInput" placeholder="Guild name">
    <button id="createGuildBtn">Create</button>
    <button id="joinGuildBtn">Join</button>
    <p id="guildInfo"></p>
  </div>

  <!-- CHAT -->
  <div class="panel">
    <h2>💬 Chat</h2>
    <div id="chatMessages"></div>
    <input type="text" id="msg">
    <button id="sendMsg">Send</button>
  </div>

  <!-- LEADERBOARD -->
  <div class="panel">
    <div id="playerLeaderboard"></div>
    <div id="guildLeaderboard"></div>
  </div>

  <!-- EVENT LOG -->
  <div class="panel">
    <h2>📜 Events</h2>
    <div id="eventLog"></div>
  </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="script.js"></script>
</body>
  </html>
