<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcane Empire MMORPG</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <h1>⚔ ARCANE EMPIRE ⚔</h1>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button id="loginBtn">Enter World</button>
</div>

<!-- GAME UI -->
<div id="gameUI" class="hidden">

  <!-- TOP HUD -->
  <div class="hud">
    <div class="player">
      <img src="https://i.imgur.com/6VBx3io.png" class="avatar">
      <div>
        <h3 id="playerName"></h3>
        <div>💰 <span id="goldCount"></span> | 💎 <span id="diamondCount"></span> | ⚔ <span id="valorCount"></span></div>
      </div>
    </div>
    <div id="bossBarContainer">
      <div id="bossBar"></div>
      <span id="bossHPText">HP: 100</span>
    </div>
  </div>

  <!-- MAIN GRID -->
  <div class="main">

    <!-- LEFT PANEL -->
    <div class="panel">
      <h3>⚔ Actions</h3>
      <button id="fightBtn">🐉 Boss Fight</button>
      <button id="trainBtn">🏋 Train</button>
    </div>

    <!-- CENTER PANEL -->
    <div class="panel center">
      <h2>🌍 World</h2>
      <div id="eventLog"></div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="panel">
      <h3>🛒 Store</h3>
      <button onclick="buyItem('Sword',50)">Sword (50)</button>
      <button onclick="buyItem('Armor',80)">Armor (80)</button>
      <button onclick="buyItem('Potion',20)">Potion (20)</button>
    </div>

  </div>

  <!-- CHAT -->
  <div class="chatBox">
    <div id="chatMessages"></div>
    <input id="msg" placeholder="Say something...">
    <button id="sendMsg">Send</button>
  </div>

  <!-- ADMIN PANEL -->
  <div id="admin" class="hidden">
    <h3>ADMIN PANEL</h3>
    <div id="adminPanel"></div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="script.js"></script>

</body>
      </html>
