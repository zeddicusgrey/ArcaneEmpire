<!DOCTYPE html>
<html>
<head>
  <title>Arcane Empire</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="welcome">
  <h1>🔥 ARCANE EMPIRE 🔥</h1>
  <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e" class="hero">
  <button id="startGameBtn">Enter the Empire</button>
</div>

<div id="loginForm" class="hidden">
  <input id="username" placeholder="Enter your name">
  <button id="loginBtn">Start Adventure</button>
</div>

<div id="gameUI" class="hidden">

  <div class="topbar">
    <h2 id="playerName"></h2>
    <div class="stats">
      💰 <span id="goldCount"></span>
      💎 <span id="diamondCount"></span>
      ⚔ <span id="valorCount"></span>
    </div>
  </div>

  <div class="menu">
    <button class="tabBtn" data-tab="arena">Arena</button>
    <button class="tabBtn" data-tab="raid">Raid</button>
    <button class="tabBtn" data-tab="dungeon">Dungeon</button>
    <button class="tabBtn" data-tab="store">Store</button>
    <button class="tabBtn" data-tab="chat">Chat</button>
  </div>

  <div id="arena" class="tab">
    <div class="card">
      <h3>🐉 Dragon Boss</h3>
      <p id="bossTimer">Loading...</p>
      <button onclick="addGold(100)">Fight</button>
    </div>
  </div>

  <div id="raid" class="tab hidden">
    <div class="card">
      <h3>🔥 Fire Raid</h3>
      <p id="raidTimer">Loading...</p>
      <button onclick="addGold(70)">Attack</button>
    </div>
  </div>

  <div id="dungeon" class="tab hidden">
    <div class="card">
      <h3>🏟 Colosseum</h3>
      <p id="dungeonTimer">Loading...</p>
      <button onclick="addValor(40)">Enter</button>
    </div>
  </div>

  <div id="store" class="tab hidden">
    <div class="card">
      <h3>🛒 Shop</h3>
      <button onclick="buyItem('Sword',50)">⚔ Sword (50)</button>
      <button onclick="buyItem('Amulet',30)">🔮 Amulet (30)</button>
    </div>
  </div>

  <div id="chat" class="tab hidden">
    <div class="card">
      <div id="worldChat"></div>
      <input id="worldMessage">
      <button id="sendWorldMsg">Send</button>
    </div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="script.js"></script>

</body>
  </html>
