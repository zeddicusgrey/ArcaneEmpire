<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌌 Arcane Empire MMORPG</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Login Panel -->
<div id="loginPanel">
  <h2>Login to Arcane Empire</h2>
  <input type="text" id="username" placeholder="Enter your username">
  <button id="loginBtn">Enter World</button>
  <div id="loginMsg"></div>
</div>

<!-- Main Game -->
<div id="mainGame" style="display:none;">
  <header>
    <h1>🌌 Arcane Empire</h1>
    <div id="playerInfo">Loading player...</div>
    <div id="resources">⚪ Silver: 0 | 💰 Gold: 0 | 🏅 VP: 0</div>
  </header>

  <nav>
    <button id="btnTraining">🏋 Training</button>
    <button id="btnBoss">🔥 Boss</button>
    <button id="btnDungeon">⚔ Dungeon</button>
    <button id="btnPvP">🤝 PvP Arena</button>
    <button id="btnShop">🏪 Shop</button>
    <button id="btnInventory">🎒 Inventory</button>
    <button id="btnLeaderboard">🏆 Leaderboard</button>
    <button id="btnOnlinePlayers">🌐 Online Players</button>
    <button id="btnProfile">👤 Profile</button>
  </nav>

  <section id="gameContent"></section>
</div>

<!-- Panels -->
<div id="inventoryPanel"></div>
<div id="runeUpgradePanel"></div>
<div id="leaderboardPanel"></div>
<div id="onlinePlayersPanel"></div>
<div id="playerProfilePanel"></div>
<div id="adminLoginPanel">
  <h2>🔑 Admin Login</h2>
  <input type="text" id="adminUser" placeholder="Username">
  <input type="password" id="adminPass" placeholder="Password">
  <button id="adminLoginBtn">Login</button>
  <div id="adminLoginMsg"></div>
</div>
<div id="adminPanel"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="script.js"></script>
</body>
</html>
